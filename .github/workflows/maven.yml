name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Print Surefire Reports
        if: failure()
        run: |
          echo "===== SUREFIRE REPORTS ====="
          find target/surefire-reports -type f -exec cat {} \;

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          JOB_STATUS: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          COMMIT_AUTHOR: ${{ github.actor }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured; skipping notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_TEXT="✅ Backend CI passed"
          else
            STATUS_TEXT="❌ Backend CI failed"
          fi

          AUTHOR_LABEL="Author"
          AUTHOR_VALUE="$COMMIT_AUTHOR"

          if [ -n "$PR_AUTHOR" ]; then
            AUTHOR_LABEL="Pull request by"
            AUTHOR_VALUE="$PR_AUTHOR"
          fi

          MESSAGE=$(printf '%s\n\nRepository: %s\nBranch: %s\nCommit: %s\nMessage: %s\n%s: %s' \
            "$STATUS_TEXT" \
            "$GITHUB_REPOSITORY" \
            "$BRANCH_NAME" \
            "${COMMIT_SHA:0:7}" \
            "$COMMIT_MESSAGE" \
            "$AUTHOR_LABEL" \
            "$AUTHOR_VALUE")

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            ${TELEGRAM_TOPIC_ID:+-d message_thread_id="${TELEGRAM_TOPIC_ID}"} \
            -d text="${MESSAGE}"
